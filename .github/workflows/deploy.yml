# Название workflow — отображается во вкладке Actions на GitHub
name: Build and Deploy

# Когда запускать pipeline
on:
  # Автоматически при каждом push в ветку main
  push:
    branches: [main]
  # Ручной запуск из интерфейса GitHub: Actions → Build and Deploy → Run workflow
  workflow_dispatch:

# Общие переменные для всех джоб
env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

# Права токена GITHUB_TOKEN для этого workflow
permissions:
  contents: read
  packages: write

jobs:
  # ── Джоба 1: сборка образа и отправка в реестр ───────────────────────────
  build-and-push:
    name: Build Docker image and push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=portfolio
          cache-to: type=gha,mode=max,scope=portfolio

  # ── Джоба 2: деплой контейнера на удалённый сервер по SSH ─────────────────
  deploy:
    name: Deploy to remote server via SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE }}:latest"
            CONTAINER="portfolio"
            APP_DIR="/opt/portfolio"
            HOST_PORT=8050

            mkdir -p "$APP_DIR"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker pull "$IMAGE"

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p "${HOST_PORT}:8050" \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            docker image prune -f
